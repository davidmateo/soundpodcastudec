<header class="login-header">
  <div class="welcome-message">
    <h1>SoundPodcastU</h1>
    <p>Accede a la plataforma de podcasts de la Universidad de Cundinamarca.</p>
  </div>
</header>

<div class="login-container">
  <form class="login-card" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

    <h2>Iniciar sesión</h2>

    <!-- EMAIL -->
    <div class="form-group">
      <label for="email">Correo</label>
      <input type="email" formControlName="email" id="email" placeholder="Introduce tu correo">

      <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error-message">
        <small>Correo inválido</small>
      </div>
    </div>

    <!-- PASSWORD -->
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" formControlName="password" id="password" placeholder="Introduce tu contraseña">

      <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-message">
        <small>Mínimo 6 caracteres</small>
      </div>
    </div>

    <button type="submit" [disabled]="loginForm.invalid">
      Entrar
    </button>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <div class="links">

      <p>¿No tienes cuenta? <a routerLink="/register">Regístrate</a></p>

      <p>Administrador <a routerLink="/admin-login">Acceder</a></p>

      <p>Creador <a routerLink="/creador-login">Acceder</a></p>

    </div>

  </form>
</div>
