<mat-toolbar class="navbar">

  <!-- 🔹 LOGO -->
  <div class="navbar-left">
    <img src="../../../assets/Sound-Podcast.png" class="logo" alt="Logo SoundPodcast">
    <span class="title">SoundPodcastU</span>
  </div>

  <!-- 🔹 MENÚ PRINCIPAL (escritorio) -->
  <div class="navbar-center hide-on-mobile">

    <!-- INICIO (solo estudiantes) -->
    <ng-container *ngIf="isUsuario">
      <button mat-button routerLink="/index">
        <mat-icon>home</mat-icon>
        <span>Inicio</span>
      </button>
    </ng-container>

    <!-- ❌ NO LOGUEADO -->
    <ng-container *ngIf="!isLogged && !isAdmin && !isCreador">
      <button mat-button routerLink="/login">
        <mat-icon>login</mat-icon>
        <span>Login</span>
      </button>
      <button mat-button routerLink="/register">
        <mat-icon>how_to_reg</mat-icon>
        <span>Register</span>
      </button>
    </ng-container>

    <!-- 👨‍💼 ADMIN -->
    <ng-container *ngIf="isAdmin">
      <button mat-button routerLink="/admin-dashboard">
        <mat-icon>dashboard</mat-icon>
        <span>Panel Admin</span>
      </button>
      <button mat-button (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </ng-container>

    <!-- 🎙️ CREADOR -->
    <ng-container *ngIf="isCreador">
      <button mat-button routerLink="/creador-dashboard">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </button>
      <button mat-button (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </ng-container>

    <!-- 👤 USUARIO NORMAL -->
    <ng-container *ngIf="isUsuario">
      <button mat-button (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </ng-container>

  </div>

  <!-- 🔹 MENÚ MÓVIL -->
  <div class="navbar-right">

    <button mat-icon-button [matMenuTriggerFor]="menu">
      <mat-icon>menu</mat-icon>
    </button>

    <mat-menu #menu="matMenu">

      <!-- INICIO (solo estudiantes) -->
      <ng-container *ngIf="isUsuario">
        <button mat-menu-item routerLink="/index">
          <mat-icon>home</mat-icon>
          <span>Inicio</span>
        </button>
      </ng-container>

      <!-- ❌ NO LOGUEADO -->
      <ng-container *ngIf="!isLogged && !isAdmin && !isCreador">
        <button mat-menu-item routerLink="/login">
          <mat-icon>login</mat-icon>
          <span>Login</span>
        </button>
        <button mat-menu-item routerLink="/register">
          <mat-icon>how_to_reg</mat-icon>
          <span>Register</span>
        </button>
      </ng-container>

      <!-- 👨‍💼 ADMIN -->
      <ng-container *ngIf="isAdmin">
        <button mat-menu-item routerLink="/admin-dashboard">
          <mat-icon>dashboard</mat-icon>
          <span>Panel Admin</span>
        </button>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </ng-container>

      <!-- 🎙️ CREADOR -->
      <ng-container *ngIf="isCreador">
        <button mat-menu-item routerLink="/creador-dashboard">
          <mat-icon>dashboard</mat-icon>
          <span>Dashboard</span>
        </button>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </ng-container>

      <!-- 👤 USUARIO NORMAL -->
      <ng-container *ngIf="isUsuario">
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </ng-container>

    </mat-menu>

  </div>

</mat-toolbar>
